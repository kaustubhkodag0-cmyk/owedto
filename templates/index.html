<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OwedTo — Meeting Commitments Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

    <div class="bg-white shadow-md rounded-xl p-10 w-full max-w-2xl">

        <h1 class="text-3xl font-bold text-gray-800 mb-2">OwedTo</h1>
        <p class="text-gray-500 mb-8">
            Paste any meeting transcript. We'll extract every commitment 
            and track who owes what to whom — automatically.
        </p>

        <form action="/upload" method="post">

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Meeting Title
                </label>
                <input
                    type="text"
                    name="meeting_title"
                    placeholder="e.g. Q2 Planning Sync"
                    required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 
                           text-gray-800 focus:outline-none focus:ring-2 
                           focus:ring-blue-500"
                />
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Meeting Transcript
                </label>
                <textarea
                    name="transcript"
                    rows="10"
                    placeholder="Paste your meeting transcript here..."
                    required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 
                           text-gray-800 focus:outline-none focus:ring-2 
                           focus:ring-blue-500"
                ></textarea>
            </div>

            <button
                type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white 
                       font-semibold py-3 rounded-lg transition duration-200"
            >
                Extract Commitments
            </button>

        </form>

        <div class="mt-6 text-center">
            <a href="/dashboard" class="text-blue-500 hover:underline text-sm">
                View Dashboard →
            </a>
        </div>

    </div>

</body>
</html>
